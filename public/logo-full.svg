<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" width="320" height="64">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="softGlow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Logo mark (square icon, right side in RTL) -->
  <g transform="translate(8, 8)">
    <rect x="0" y="0" width="48" height="48" rx="12" fill="url(#logoGrad)"/>
    <rect x="0" y="0" width="48" height="24" rx="12" fill="#ffffff" opacity="0.08"/>
    <g filter="url(#softGlow2)">
      <!-- "م" stylized -->
      <path d="
        M 16 36
        Q 16 22 24 22
        Q 32 22 32 36
        L 29 36
        Q 29 25 24 25
        Q 19 25 19 36
        Z
      " fill="#ffffff"/>
      <!-- Spark -->
      <path d="M 34 14 L 35.5 17.5 L 39 19 L 35.5 20.5 L 34 24 L 32.5 20.5 L 29 19 L 32.5 17.5 Z" fill="#ffffff"/>
      <circle cx="13" cy="40" r="2" fill="#ffffff" opacity="0.7"/>
    </g>
    <rect x="0" y="0" width="48" height="48" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="0.5"/>
  </g>

  <!-- Wordmark "محتواسان" in Persian -->
  <text x="280" y="40" text-anchor="end" font-family="Vazirmatn, Tahoma, sans-serif" font-size="26" font-weight="700" fill="url(#textGrad)" direction="rtl">محتواسان</text>

  <!-- Tagline below (small) -->
  <text x="280" y="54" text-anchor="end" font-family="Vazirmatn, Tahoma, sans-serif" font-size="10" font-weight="400" fill="#9ca3af" direction="rtl">AI Content Generator</text>
</svg>
